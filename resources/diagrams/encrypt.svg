<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 580 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter,system-ui,sans-serif">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
    <path d="M0,0 L8,3.5 L0,7 Z" fill="#94a3b8"/>
  </marker>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
  </filter>
</defs>

<!-- ── FILE FORMAT STRIP ── -->
<text x="16" y="20" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">ФОРМАТ ФАЙЛА  .enc</text>
<rect x="16" y="28" width="548" height="32" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<!-- segments -->
<rect x="16" y="28" width="52" height="32" rx="6" fill="#4f46e5"/>
<text x="42" y="48" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">magic</text>
<text x="42" y="56" font-size="7" fill="#c7d2fe" text-anchor="middle">AES·4B</text>
<rect x="69" y="28" width="30" height="32" fill="#7c3aed"/>
<text x="84" y="47" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">mode</text>
<text x="84" y="56" font-size="7" fill="#ddd6fe" text-anchor="middle">1B</text>
<rect x="100" y="28" width="80" height="32" fill="#0369a1"/>
<text x="140" y="47" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">salt</text>
<text x="140" y="56" font-size="7" fill="#bae6fd" text-anchor="middle">16B · off 5</text>
<rect x="181" y="28" width="84" height="32" fill="#0284c7"/>
<text x="223" y="47" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">iv / nonce</text>
<text x="223" y="56" font-size="7" fill="#bae6fd" text-anchor="middle">16B · off 21</text>
<rect x="266" y="28" width="222" height="32" fill="#334155"/>
<text x="377" y="47" font-size="8.5" fill="#cbd5e1" text-anchor="middle" font-weight="700">ciphertext</text>
<text x="377" y="56" font-size="7" fill="#94a3b8" text-anchor="middle">N байт · off 37</text>
<rect x="489" y="28" width="75" height="32" rx="6" fill="#b45309"/>
<text x="527" y="47" font-size="8.5" fill="white" text-anchor="middle" font-weight="700">tag</text>
<text x="527" y="56" font-size="7" fill="#fde68a" text-anchor="middle">16-32B</text>

<!-- ── ENCRYPTION PIPELINE ── -->
<text x="16" y="84" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">КОНВЕЙЕР ШИФРОВАНИЯ</text>

<!-- Node: File -->
<rect x="16" y="92" width="82" height="54" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="57" y="113" font-size="8.5" fill="#94a3b8" text-anchor="middle">Входной</text>
<text x="57" y="127" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="700">Файл</text>
<text x="57" y="140" font-size="7.5" fill="#94a3b8" text-anchor="middle">plaintext</text>

<!-- Arrow -->
<line x1="98" y1="119" x2="120" y2="119" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Node: PBKDF2 -->
<rect x="121" y="92" width="100" height="54" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
<text x="171" y="113" font-size="9.5" fill="#4f46e5" text-anchor="middle" font-weight="700">PBKDF2</text>
<text x="171" y="126" font-size="8" fill="#6366f1" text-anchor="middle">HMAC-SHA256</text>
<text x="171" y="138" font-size="7.5" fill="#818cf8" text-anchor="middle">100 000 итераций</text>
<!-- Salt badge -->
<rect x="131" y="150" width="80" height="16" rx="8" fill="#dbeafe"/>
<text x="171" y="162" font-size="7.5" fill="#1d4ed8" text-anchor="middle">соль 16B (random)</text>

<!-- Arrow -->
<line x1="221" y1="119" x2="244" y2="119" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Node: Keys -->
<rect x="245" y="92" width="108" height="54" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
<text x="299" y="110" font-size="9" fill="#4f46e5" text-anchor="middle" font-weight="700">64 байта ключей</text>
<text x="299" y="124" font-size="8" fill="#555666" text-anchor="middle">enc[0..31] → AES-256</text>
<text x="299" y="137" font-size="8" fill="#555666" text-anchor="middle">mac[32..63] → HMAC</text>

<!-- Arrow -->
<line x1="353" y1="119" x2="376" y2="119" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Node: AES -->
<rect x="377" y="92" width="86" height="54" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
<text x="420" y="112" font-size="9.5" fill="#e2e8f0" text-anchor="middle" font-weight="700">AES-256</text>
<text x="420" y="125" font-size="9" fill="#94a3b8" text-anchor="middle">[MODE]</text>
<text x="420" y="138" font-size="7.5" fill="#64748b" text-anchor="middle">+ IV / nonce</text>

<!-- Arrow -->
<line x1="463" y1="119" x2="486" y2="119" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Node: Output -->
<rect x="487" y="92" width="77" height="54" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="526" y="113" font-size="8.5" fill="#94a3b8" text-anchor="middle">Выходной</text>
<text x="526" y="127" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="700">.enc</text>
<text x="526" y="140" font-size="7.5" fill="#94a3b8" text-anchor="middle">файл</text>

<!-- IV badge -->
<rect x="377" y="150" width="86" height="16" rx="8" fill="#dbeafe"/>
<text x="420" y="162" font-size="7.5" fill="#1d4ed8" text-anchor="middle">IV 16B (random)</text>

<!-- ── AUTH MODES ── -->
<text x="16" y="190" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">АУТЕНТИФИКАЦИЯ</text>

<!-- AEAD box -->
<rect x="16" y="198" width="268" height="68" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="16" y="198" width="268" height="22" rx="8" fill="#16a34a"/>
<rect x="16" y="208" width="268" height="12" fill="#16a34a"/>
<text x="150" y="213" font-size="9.5" fill="white" text-anchor="middle" font-weight="700">AEAD (GCM · CCM · GCM-SIV · SIV)</text>
<text x="32" y="234" font-size="8.5" fill="#166534">● Шифрование и аутентификация совмещены</text>
<text x="32" y="248" font-size="8.5" fill="#166534">● Тег аутентификации 16 байт</text>
<text x="32" y="261" font-size="8.5" fill="#166534">● Встроен в конец файла</text>

<!-- Non-AEAD box -->
<rect x="296" y="198" width="268" height="68" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="296" y="198" width="268" height="22" rx="8" fill="#d97706"/>
<rect x="296" y="208" width="268" height="12" fill="#d97706"/>
<text x="430" y="213" font-size="9.5" fill="white" text-anchor="middle" font-weight="700">Non-AEAD (ECB · CBC · CFB · OFB · CTR)</text>
<text x="312" y="234" font-size="8.5" fill="#92400e">● Encrypt-then-MAC: HMAC-SHA256</text>
<text x="312" y="248" font-size="8.5" fill="#92400e">● Охватывает header ‖ ciphertext</text>
<text x="312" y="261" font-size="8.5" fill="#92400e">● Тег 32 байта в конце файла</text>

<!-- ── MODE MATRIX ── -->
<text x="16" y="288" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">МАТРИЦА РЕЖИМОВ</text>

<rect x="16" y="296" width="548" height="116" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
<!-- Header -->
<rect x="16" y="296" width="548" height="22" rx="8" fill="#f8fafc"/>
<rect x="16" y="306" width="548" height="12" fill="#f8fafc"/>
<line x1="16" y1="318" x2="564" y2="318" stroke="#e2e8f0" stroke-width="1"/>
<text x="62"  y="311" font-size="8.5" fill="#64748b" text-anchor="middle" font-weight="700">Режим</text>
<text x="140" y="311" font-size="8.5" fill="#64748b" text-anchor="middle" font-weight="700">IV / Nonce</text>
<text x="220" y="311" font-size="8.5" fill="#64748b" text-anchor="middle" font-weight="700">AEAD</text>
<text x="310" y="311" font-size="8.5" fill="#64748b" text-anchor="middle" font-weight="700">Параллель</text>
<text x="430" y="311" font-size="8.5" fill="#64748b" text-anchor="middle" font-weight="700">Описание</text>
<!-- ECB -->
<text x="62"  y="331" font-size="9" fill="#b91c1c" text-anchor="middle" font-weight="700">ECB</text>
<text x="140" y="331" font-size="9" fill="#dc2626" text-anchor="middle">✗</text>
<text x="220" y="331" font-size="9" fill="#dc2626" text-anchor="middle">✗</text>
<text x="310" y="331" font-size="9" fill="#16a34a" text-anchor="middle">✓</text>
<text x="430" y="331" font-size="8.5" fill="#64748b" text-anchor="middle">Детерминированный, небезопасен</text>
<line x1="28" y1="337" x2="552" y2="337" stroke="#f1f5f9" stroke-width="1"/>
<!-- CBC -->
<text x="62"  y="350" font-size="9" fill="#374151" text-anchor="middle" font-weight="700">CBC</text>
<text x="140" y="350" font-size="9" fill="#16a34a" text-anchor="middle">✓</text>
<text x="220" y="350" font-size="9" fill="#dc2626" text-anchor="middle">✗</text>
<text x="310" y="350" font-size="9" fill="#dc2626" text-anchor="middle">✗</text>
<text x="430" y="350" font-size="8.5" fill="#64748b" text-anchor="middle">Последовательный, случайный IV</text>
<line x1="28" y1="356" x2="552" y2="356" stroke="#f1f5f9" stroke-width="1"/>
<!-- CTR -->
<text x="62"  y="369" font-size="9" fill="#374151" text-anchor="middle" font-weight="700">CTR</text>
<text x="140" y="369" font-size="9" fill="#16a34a" text-anchor="middle">✓</text>
<text x="220" y="369" font-size="9" fill="#dc2626" text-anchor="middle">✗</text>
<text x="310" y="369" font-size="9" fill="#16a34a" text-anchor="middle">✓</text>
<text x="430" y="369" font-size="8.5" fill="#64748b" text-anchor="middle">Параллелизуемый поток</text>
<line x1="28" y1="375" x2="552" y2="375" stroke="#f1f5f9" stroke-width="1"/>
<!-- GCM -->
<text x="62"  y="388" font-size="9" fill="#4f46e5" text-anchor="middle" font-weight="700">GCM/CCM</text>
<text x="140" y="388" font-size="9" fill="#16a34a" text-anchor="middle">✓</text>
<text x="220" y="388" font-size="9" fill="#16a34a" text-anchor="middle">✓</text>
<text x="310" y="388" font-size="9" fill="#16a34a" text-anchor="middle">✓/✗</text>
<text x="430" y="388" font-size="8.5" fill="#64748b" text-anchor="middle">NIST AEAD, 12-байт nonce</text>
<line x1="28" y1="394" x2="552" y2="394" stroke="#f1f5f9" stroke-width="1"/>
<!-- SIV -->
<text x="62"  y="407" font-size="9" fill="#7c3aed" text-anchor="middle" font-weight="700">SIV / GCM-SIV</text>
<text x="140" y="407" font-size="9" fill="#64748b" text-anchor="middle">—</text>
<text x="220" y="407" font-size="9" fill="#16a34a" text-anchor="middle">✓</text>
<text x="310" y="407" font-size="9" fill="#16a34a" text-anchor="middle">✓</text>
<text x="430" y="407" font-size="8.5" fill="#64748b" text-anchor="middle">Устойчив к повтору nonce, RFC 5297/8452</text>
</svg>
