<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 580 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter,system-ui,sans-serif">
<defs>
  <filter id="shadow">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
  </filter>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
    <path d="M0,0 L8,3.5 L0,7 Z" fill="#94a3b8"/>
  </marker>
</defs>

<!-- ── HEADER BYTE MAP ── -->
<text x="16" y="20" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">РАЗБОР ЗАГОЛОВКА  .enc  (37 байт)</text>

<!-- Byte strip -->
<rect x="16" y="28" width="548" height="36" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<rect x="16" y="28" width="52" height="36" rx="6" fill="#4f46e5"/>
<text x="42" y="50" font-size="9" fill="white" text-anchor="middle" font-weight="700">magic</text>
<rect x="69" y="28" width="30" height="36" fill="#7c3aed"/>
<text x="84" y="50" font-size="9" fill="white" text-anchor="middle" font-weight="700">mode</text>
<rect x="100" y="28" width="88" height="36" fill="#0369a1"/>
<text x="144" y="50" font-size="9" fill="white" text-anchor="middle" font-weight="700">salt</text>
<rect x="189" y="28" width="88" height="36" fill="#0284c7"/>
<text x="233" y="50" font-size="9" fill="white" text-anchor="middle" font-weight="700">iv / nonce</text>
<rect x="278" y="28" width="218" height="36" fill="#334155"/>
<text x="387" y="50" font-size="9" fill="#94a3b8" text-anchor="middle" font-weight="700">ciphertext</text>
<rect x="497" y="28" width="67" height="36" rx="6" fill="#b45309"/>
<text x="531" y="50" font-size="9" fill="white" text-anchor="middle" font-weight="700">tag</text>

<!-- Annotations -->
<text x="42"  y="74" font-size="7.5" fill="#4f46e5" text-anchor="middle">«AES\x03» · 4B · off 0</text>
<text x="84"  y="74" font-size="7.5" fill="#7c3aed" text-anchor="middle">uint8 · off 4</text>
<text x="144" y="74" font-size="7.5" fill="#0369a1" text-anchor="middle">PBKDF2 · 16B · off 5</text>
<text x="233" y="74" font-size="7.5" fill="#0284c7" text-anchor="middle">AES IV · 16B · off 21</text>
<text x="387" y="74" font-size="7.5" fill="#475569" text-anchor="middle">N байт · off 37</text>
<text x="531" y="74" font-size="7.5" fill="#b45309" text-anchor="middle">16B AEAD / 32B HMAC</text>

<!-- ── KDF PIPELINE ── -->
<text x="16" y="96" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">ВЫВОД КЛЮЧЕЙ  PBKDF2-HMAC-SHA256</text>

<!-- Password -->
<rect x="16" y="104" width="88" height="48" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="60" y="123" font-size="9" fill="#94a3b8" text-anchor="middle">Пароль</text>
<text x="60" y="138" font-size="9.5" fill="#1e293b" text-anchor="middle" font-weight="700">+ соль</text>
<line x1="104" y1="128" x2="126" y2="128" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- PBKDF2 -->
<rect x="127" y="104" width="130" height="48" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
<text x="192" y="121" font-size="9.5" fill="#4f46e5" text-anchor="middle" font-weight="700">PBKDF2-HMAC-SHA256</text>
<text x="192" y="134" font-size="8" fill="#6366f1" text-anchor="middle">100 000 итераций</text>
<text x="192" y="146" font-size="8" fill="#818cf8" text-anchor="middle">соль 16B (random) → 64B</text>
<line x1="257" y1="128" x2="279" y2="128" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Split -->
<rect x="280" y="104" width="64" height="48" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="312" y="123" font-size="8.5" fill="#374151" text-anchor="middle" font-weight="700">64 байта</text>
<text x="312" y="136" font-size="8" fill="#64748b" text-anchor="middle">enc[0..31]</text>
<text x="312" y="148" font-size="8" fill="#64748b" text-anchor="middle">mac[32..63]</text>

<!-- Fork arrows -->
<line x1="344" y1="120" x2="376" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="344" y1="136" x2="376" y2="146" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- enc_key -->
<rect x="377" y="100" width="104" height="32" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
<text x="429" y="115" font-size="9" fill="#16a34a" text-anchor="middle" font-weight="700">enc_key AES-256</text>
<text x="429" y="126" font-size="7.5" fill="#166534" text-anchor="middle">байты [0..31] · 32 байта</text>

<!-- mac_key -->
<rect x="377" y="140" width="104" height="32" rx="6" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
<text x="429" y="155" font-size="9" fill="#d97706" text-anchor="middle" font-weight="700">mac_key HMAC</text>
<text x="429" y="166" font-size="7.5" fill="#92400e" text-anchor="middle">байты [32..63] · 32 байта</text>

<!-- Usage arrows -->
<line x1="481" y1="116" x2="503" y2="116" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="481" y1="156" x2="503" y2="156" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- AES enc -->
<rect x="504" y="100" width="60" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
<text x="534" y="121" font-size="8.5" fill="#e2e8f0" text-anchor="middle" font-weight="700">AES-256</text>

<!-- HMAC / SIV -->
<rect x="504" y="140" width="60" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
<text x="534" y="158" font-size="8" fill="#e2e8f0" text-anchor="middle" font-weight="700">HMAC / SIV</text>

<!-- ── SIZE FORMULA ── -->
<text x="16" y="186" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">ФОРМУЛА РАЗМЕРА ВЫХОДНОГО ФАЙЛА</text>

<rect x="16" y="194" width="548" height="60" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="290" y="218" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="700">размер = 37 + |plaintext| + tag_size</text>
<line x1="36" y1="226" x2="544" y2="226" stroke="#f1f5f9" stroke-width="1"/>
<!-- segments visual -->
<rect x="36" y="234" width="50" height="12" rx="3" fill="#4f46e5"/>
<text x="61" y="244" font-size="7.5" fill="white" text-anchor="middle" font-weight="700">header 37B</text>
<rect x="92" y="234" width="200" height="12" rx="3" fill="#334155"/>
<text x="192" y="244" font-size="7.5" fill="#94a3b8" text-anchor="middle" font-weight="700">ciphertext = |plaintext|</text>
<rect x="298" y="234" width="60" height="12" rx="3" fill="#16a34a"/>
<text x="328" y="244" font-size="7.5" fill="white" text-anchor="middle" font-weight="700">AEAD 16B</text>
<text x="372" y="244" font-size="8.5" fill="#94a3b8" text-anchor="middle">или</text>
<rect x="390" y="234" width="80" height="12" rx="3" fill="#d97706"/>
<text x="430" y="244" font-size="7.5" fill="white" text-anchor="middle" font-weight="700">HMAC 32B</text>

<!-- ── MODE IDs ── -->
<text x="16" y="276" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">ИДЕНТИФИКАТОРЫ РЕЖИМОВ</text>

<rect x="16" y="284" width="548" height="88" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
<!-- Row 1: Non-AEAD -->
<rect x="16" y="284" width="548" height="20" rx="8" fill="#f8fafc"/>
<rect x="16" y="292" width="548" height="12" fill="#f8fafc"/>
<text x="284" y="298" font-size="8" fill="#64748b" text-anchor="middle" font-weight="700">Non-AEAD (внешний HMAC-SHA256)</text>
<line x1="28" y1="304" x2="552" y2="304" stroke="#f1f5f9" stroke-width="1"/>
<!-- Mode chips -->
<rect x="28" y="309" width="54" height="20" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="55" y="323" font-size="8.5" fill="#374151" text-anchor="middle" font-weight="700">0 · ECB</text>
<rect x="90" y="309" width="54" height="20" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="117" y="323" font-size="8.5" fill="#374151" text-anchor="middle" font-weight="700">1 · CBC</text>
<rect x="152" y="309" width="54" height="20" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="179" y="323" font-size="8.5" fill="#374151" text-anchor="middle" font-weight="700">2 · CFB</text>
<rect x="214" y="309" width="54" height="20" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="241" y="323" font-size="8.5" fill="#374151" text-anchor="middle" font-weight="700">3 · OFB</text>
<rect x="276" y="309" width="54" height="20" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
<text x="303" y="323" font-size="8.5" fill="#374151" text-anchor="middle" font-weight="700">4 · CTR</text>
<!-- Row 2: AEAD -->
<line x1="28" y1="334" x2="552" y2="334" stroke="#f1f5f9" stroke-width="1"/>
<rect x="28" y="338" width="548" height="12" rx="3" fill="#f8fafc"/>
<text x="284" y="348" font-size="8" fill="#64748b" text-anchor="middle" font-weight="700">AEAD (встроенный тег 16B)</text>
<line x1="28" y1="352" x2="552" y2="352" stroke="#f1f5f9" stroke-width="1"/>
<rect x="28" y="357" width="62" height="20" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
<text x="59" y="371" font-size="8.5" fill="#4f46e5" text-anchor="middle" font-weight="700">5 · GCM</text>
<rect x="98" y="357" width="62" height="20" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
<text x="129" y="371" font-size="8.5" fill="#4f46e5" text-anchor="middle" font-weight="700">6 · CCM</text>
<rect x="168" y="357" width="78" height="20" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
<text x="207" y="371" font-size="8.5" fill="#7c3aed" text-anchor="middle" font-weight="700">7 · GCM-SIV</text>
<rect x="254" y="357" width="62" height="20" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
<text x="285" y="371" font-size="8.5" fill="#7c3aed" text-anchor="middle" font-weight="700">8 · SIV</text>
</svg>
