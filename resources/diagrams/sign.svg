<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 580 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter,system-ui,sans-serif">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
    <path d="M0,0 L8,3.5 L0,7 Z" fill="#94a3b8"/>
  </marker>
  <marker id="arrG" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
    <path d="M0,0 L8,3.5 L0,7 Z" fill="#16a34a"/>
  </marker>
  <marker id="arrR" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
    <path d="M0,0 L8,3.5 L0,7 Z" fill="#dc2626"/>
  </marker>
  <filter id="shadow">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
  </filter>
</defs>

<!-- ── KEY GENERATION ── -->
<text x="16" y="20" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">ГЕНЕРАЦИЯ КЛЮЧЕВОЙ ПАРЫ  ECDSA P-256</text>
<rect x="16" y="28" width="548" height="60" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>

<!-- CSPRNG -->
<rect x="28" y="38" width="94" height="40" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="75" y="55" font-size="9.5" fill="#7c3aed" text-anchor="middle" font-weight="700">CSPRNG</text>
<text x="75" y="68" font-size="8" fill="#a78bfa" text-anchor="middle">случайность ОС</text>
<line x1="122" y1="58" x2="146" y2="58" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Private key -->
<rect x="147" y="38" width="116" height="40" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="205" y="55" font-size="9.5" fill="#7c3aed" text-anchor="middle" font-weight="700">Закрытый ключ</text>
<text x="205" y="68" font-size="8" fill="#a78bfa" text-anchor="middle">256-bit скаляр d</text>
<line x1="263" y1="58" x2="287" y2="58" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Public key -->
<rect x="288" y="38" width="136" height="40" rx="6" fill="#eff6ff" stroke="#0369a1" stroke-width="1.5"/>
<text x="356" y="55" font-size="9.5" fill="#0369a1" text-anchor="middle" font-weight="700">Открытый ключ</text>
<text x="356" y="68" font-size="8" fill="#38bdf8" text-anchor="middle">Q = d·G  (точка на P-256)</text>
<line x1="424" y1="58" x2="448" y2="58" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- PEM files -->
<rect x="449" y="38" width="104" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
<text x="501" y="55" font-size="9" fill="#e2e8f0" text-anchor="middle" font-weight="700">PEM файлы</text>
<text x="501" y="68" font-size="8" fill="#64748b" text-anchor="middle">priv.pem / pub.pem</text>

<!-- ── SIGN PIPELINE ── -->
<text x="16" y="110" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">ПОДПИСЬ ФАЙЛА</text>

<rect x="16" y="118" width="74" height="54" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="53" y="139" font-size="8.5" fill="#94a3b8" text-anchor="middle">Входной</text>
<text x="53" y="153" font-size="12" fill="#1e293b" text-anchor="middle" font-weight="700">Файл</text>
<text x="53" y="165" font-size="7.5" fill="#94a3b8" text-anchor="middle">любой</text>
<line x1="90" y1="145" x2="112" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="113" y="118" width="90" height="54" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
<text x="158" y="139" font-size="9.5" fill="#4f46e5" text-anchor="middle" font-weight="700">SHA-256</text>
<text x="158" y="153" font-size="8" fill="#6366f1" text-anchor="middle">хэш-дайджест</text>
<text x="158" y="165" font-size="7.5" fill="#818cf8" text-anchor="middle">32 байта</text>
<line x1="203" y1="145" x2="225" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="226" y="118" width="108" height="54" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
<text x="280" y="138" font-size="9.5" fill="#7c3aed" text-anchor="middle" font-weight="700">ECDSA Sign</text>
<text x="280" y="151" font-size="8" fill="#a78bfa" text-anchor="middle">+ закрытый ключ</text>
<text x="280" y="164" font-size="7.5" fill="#c4b5fd" text-anchor="middle">nonce k (random)</text>
<line x1="334" y1="145" x2="356" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="357" y="118" width="96" height="54" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
<text x="405" y="139" font-size="9" fill="#e2e8f0" text-anchor="middle" font-weight="700">Подпись DER</text>
<text x="405" y="152" font-size="8" fill="#94a3b8" text-anchor="middle">(r, s)</text>
<text x="405" y="165" font-size="7.5" fill="#475569" text-anchor="middle">~70-72 байта</text>
<line x1="453" y1="145" x2="475" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="476" y="118" width="88" height="54" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="520" y="139" font-size="8.5" fill="#94a3b8" text-anchor="middle">Файл</text>
<text x="520" y="153" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="700">.sig</text>
<text x="520" y="165" font-size="7.5" fill="#94a3b8" text-anchor="middle">DER подпись</text>

<!-- ── VERIFY PIPELINE ── -->
<text x="16" y="196" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">ПРОВЕРКА ПОДПИСИ</text>

<rect x="16" y="204" width="74" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="53" y="224" font-size="8.5" fill="#94a3b8" text-anchor="middle">Файл</text>
<text x="53" y="237" font-size="12" fill="#1e293b" text-anchor="middle" font-weight="700">данные</text>
<text x="53" y="248" font-size="7.5" fill="#94a3b8" text-anchor="middle">+ .sig</text>
<line x1="90" y1="229" x2="112" y2="229" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="113" y="204" width="90" height="50" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
<text x="158" y="224" font-size="9.5" fill="#4f46e5" text-anchor="middle" font-weight="700">SHA-256</text>
<text x="158" y="237" font-size="8" fill="#6366f1" text-anchor="middle">хэш-дайджест</text>
<line x1="203" y1="229" x2="225" y2="229" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="226" y="204" width="108" height="50" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
<text x="280" y="223" font-size="9.5" fill="#7c3aed" text-anchor="middle" font-weight="700">ECDSA Verify</text>
<text x="280" y="236" font-size="8" fill="#a78bfa" text-anchor="middle">открытый ключ</text>
<text x="280" y="247" font-size="7.5" fill="#c4b5fd" text-anchor="middle">+ подпись DER</text>

<!-- Fork lines -->
<line x1="280" y1="254" x2="280" y2="272" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="280" y1="272" x2="152" y2="272" stroke="#16a34a" stroke-width="1.5"/>
<line x1="280" y1="272" x2="408" y2="272" stroke="#dc2626" stroke-width="1.5"/>
<line x1="152" y1="272" x2="152" y2="286" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrG)"/>
<line x1="408" y1="272" x2="408" y2="286" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrR)"/>
<text x="220" y="269" font-size="8" fill="#16a34a" text-anchor="middle">верна</text>
<text x="340" y="269" font-size="8" fill="#dc2626" text-anchor="middle">неверна</text>

<!-- Valid result -->
<rect x="68" y="288" width="168" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
<text x="152" y="310" font-size="20" fill="#16a34a" text-anchor="middle">✓</text>
<text x="152" y="328" font-size="9" fill="#16a34a" text-anchor="middle" font-weight="700">Файл не изменён</text>

<!-- Invalid result -->
<rect x="324" y="288" width="168" height="50" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
<text x="408" y="310" font-size="20" fill="#dc2626" text-anchor="middle">✗</text>
<text x="408" y="328" font-size="9" fill="#dc2626" text-anchor="middle" font-weight="700">Файл изменён / не тот ключ</text>

<!-- ── DER FORMAT ── -->
<text x="16" y="358" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.2">ФОРМАТ ПОДПИСИ  DER / ASN.1</text>
<rect x="16" y="366" width="548" height="28" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
<rect x="16" y="366" width="40" height="28" rx="6" fill="#334155"/>
<text x="36" y="384" font-size="8" fill="white" text-anchor="middle" font-weight="700">0x30 seq</text>
<rect x="57" y="366" width="28" height="28" fill="#475569"/>
<text x="71" y="384" font-size="8" fill="white" text-anchor="middle">len</text>
<rect x="86" y="366" width="22" height="28" fill="#7c3aed" opacity="0.85"/>
<text x="97" y="384" font-size="8" fill="white" text-anchor="middle">0x02</text>
<rect x="109" y="366" width="22" height="28" fill="#a78bfa" opacity="0.85"/>
<text x="120" y="384" font-size="8" fill="white" text-anchor="middle">rlen</text>
<rect x="132" y="366" width="130" height="28" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
<text x="197" y="384" font-size="8" fill="#7c3aed" text-anchor="middle" font-weight="700">r  (INTEGER, 32 байта)</text>
<rect x="263" y="366" width="22" height="28" fill="#0369a1" opacity="0.85"/>
<text x="274" y="384" font-size="8" fill="white" text-anchor="middle">0x02</text>
<rect x="286" y="366" width="22" height="28" fill="#38bdf8" opacity="0.85"/>
<text x="297" y="384" font-size="8" fill="white" text-anchor="middle">slen</text>
<rect x="309" y="366" width="130" height="28" fill="#eff6ff" stroke="#0369a1" stroke-width="1"/>
<text x="374" y="384" font-size="8" fill="#0369a1" text-anchor="middle" font-weight="700">s  (INTEGER, 32 байта)</text>
<rect x="440" y="366" width="124" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="502" y="381" font-size="8" fill="#64748b" text-anchor="middle">итого ~70-72 байта</text>
</svg>
